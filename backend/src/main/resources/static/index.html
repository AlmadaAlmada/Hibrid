<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hibrid</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="perfil" id="perfil" data-rota="usuario">
                <div class="avatar">H</div>
                <div class="perfil-nome" id="perfilNome">Carregando...</div>
                <div class="perfil-email" id="perfilEmail"></div>
            </div>
            <nav class="menu">
                <button class="menu-item" data-rota="inicio">Inicio</button>
                <button class="menu-item" data-rota="animais">Listagem de Animais</button>
                <button class="menu-item" data-rota="semen">Listagem de Semen</button>
                <button class="menu-item" data-rota="analise">Analise de Dados</button>
            </nav>
            <button class="sair">Desconectar</button>
        </aside>
        <main class="conteudo" id="view"></main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

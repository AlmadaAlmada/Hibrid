spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hibrid}
spring.datasource.username=${DB_USER:hibrid}
spring.datasource.password=${DB_PASSWORD:hibrid}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=always

server.port=8080
